name: Kanban Desktop — Release

on:
  push:
    tags:
      - 'kanban-v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://kanban-api.zielinski.dev.br

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Compile Electron main process
        run: npx tsc -p tsconfig.json
        working-directory: desktop

      - name: Package Electron app
        run: npx electron-builder --config electron-builder.json --publish always
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (add certs when available):
          # CSC_LINK: ${{ secrets.MAC_CERT }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - uses: softprops/action-gh-release@v2
        with:
          files: bin/electron-kanban/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
